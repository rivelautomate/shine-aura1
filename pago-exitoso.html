<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>¡Pago exitoso! — SHINE AURA</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,400&family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;}
body{margin:0;min-height:100vh;font-family:'Inter',sans-serif;
  background:linear-gradient(135deg,#FDE8F2 0%,#FFF8F5 45%,#FAD4E4 100%);
  display:flex;align-items:center;justify-content:center;padding:20px;color:#2D1B24;}
.card{background:rgba(255,255,255,.85);backdrop-filter:blur(10px);
  border-radius:28px;padding:40px 32px;max-width:520px;width:100%;text-align:center;
  box-shadow:0 24px 60px rgba(212,120,155,.15);border:1px solid rgba(212,120,155,.18);}
.icon{width:80px;height:80px;border-radius:50%;margin:0 auto 20px;
  background:linear-gradient(135deg,#7ed4a0,#3aa968);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 10px 30px rgba(58,169,104,.3);
  animation:pop .5s cubic-bezier(.3,1.4,.5,1);}
@keyframes pop{from{transform:scale(.3);opacity:0;}to{transform:scale(1);opacity:1;}}
.icon svg{width:40px;height:40px;stroke:#fff;stroke-width:3;fill:none;stroke-linecap:round;stroke-linejoin:round;}
h1{font-family:'Playfair Display',serif;font-weight:400;font-size:30px;margin:0 0 10px;}
h1 em{font-style:italic;color:#D4789B;}
.lead{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:19px;color:#9B7E8C;margin:0 0 24px;}
.order-code{display:inline-block;background:#FDE8F2;padding:6px 14px;border-radius:999px;
  font-weight:600;font-size:12px;letter-spacing:.05em;color:#D4789B;margin-bottom:20px;}
.summary{background:#fff;border:1px solid rgba(212,120,155,.18);border-radius:18px;
  text-align:left;padding:18px 20px;margin:18px 0 22px;font-size:13px;color:#4A3040;}
.summary h3{font-family:'Playfair Display',serif;font-weight:400;font-size:17px;margin:0 0 14px;color:#2D1B24;}
.sum-row{display:flex;justify-content:space-between;padding:6px 0;gap:10px;}
.sum-row + .sum-row{border-top:1px dashed rgba(212,120,155,.2);}
.sum-row .name{color:#2D1B24;}
.sum-row .qty{color:#9B7E8C;font-size:12px;}
.sum-row .price{color:#2D1B24;font-weight:500;white-space:nowrap;}
.sum-total{display:flex;justify-content:space-between;border-top:2px solid rgba(212,120,155,.35);
  margin-top:10px;padding-top:12px;font-size:15px;font-weight:600;color:#2D1B24;}
.sum-meta{margin-top:12px;padding-top:12px;border-top:1px dashed rgba(212,120,155,.2);font-size:12px;color:#6E5060;line-height:1.55;}
.sum-meta div + div{margin-top:4px;}
.note{background:#FDE8F2;border-left:3px solid #D4789B;border-radius:10px;
  padding:14px 16px;text-align:left;font-size:13px;margin:18px 0;color:#4A3040;line-height:1.55;
  display:flex;gap:10px;}
.note .ico{font-size:18px;flex-shrink:0;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:14px 24px;
  border-radius:999px;text-decoration:none;font-size:13px;font-weight:600;letter-spacing:.08em;
  transition:transform .15s,filter .2s;width:100%;border:none;cursor:pointer;}
.btn:hover{transform:translateY(-1px);filter:brightness(.95);}
.btn-wa{background:linear-gradient(135deg,#25D366 0%,#128C7E 100%);color:#fff;margin-bottom:10px;}
.btn-ghost{background:transparent;color:#2D1B24;border:1.5px solid rgba(45,27,36,.2);}
.btn-ghost:hover{background:rgba(45,27,36,.05);}
.loading{color:#9B7E8C;font-style:italic;padding:20px 0;}
.error-box{background:#FEE;border-left:3px solid #D46A6A;border-radius:10px;padding:12px 14px;
  color:#7A2929;font-size:12.5px;text-align:left;margin:16px 0;}
.brand{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:22px;color:#D4789B;margin-top:26px;}
</style>
</head>
<body>
<div class="card" id="card">
  <div class="icon">
    <svg viewBox="0 0 24 24"><polyline points="4 12.5 10 18.5 20 6.5"/></svg>
  </div>
  <h1>¡Gracias por tu <em>compra</em>!</h1>
  <p class="lead">Tu pago fue confirmado ✨</p>
  <div id="orderWrap"><div class="loading">Cargando tu pedido...</div></div>
  <div class="note">
    <span class="ico">🧡</span>
    <span>Tocá el botón para coordinar el envío con <strong>Shine Aura</strong> por WhatsApp. Ya tenemos tu pedido listo para despachar.</span>
  </div>
  <a id="btnWa" class="btn btn-wa" target="_blank" rel="noopener" href="https://wa.me/5491133440712">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
    Coordinar envío por WhatsApp
  </a>
  <a href="/" class="btn btn-ghost">Volver a la tienda</a>
  <div class="brand">Shine Aura ✨</div>
</div>

<script>
const WA_NUM = '5491133440712';

function fmt(n){return '$' + Number(n).toLocaleString('es-AR');}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function getOrderCode(){
  const q = new URLSearchParams(location.search);
  return q.get('order') || q.get('external_reference') || '';
}

function buildWaMessage(sale){
  const c = sale.customer || {};
  const items = Array.isArray(sale.items) ? sale.items : [];
  const lines = [
    '✅ *Pedido SHINE AURA — Pago confirmado por MercadoPago*', '',
    `🧾 *Nº de pedido:* ${sale.orderCode}`,
    `👤 *Cliente:* ${(c.name||'')} ${(c.lastname||'')}`.trim(),
    `📍 *Zona:* ${c.district || ''} (CP ${c.zip || ''})`, '',
    '🛍 *Productos:*',
    ...items.map(i => `• ${i.qty}× ${i.name}  —  ${fmt(i.price * i.qty)}`),
    '', `💰 *Total:* ${fmt(sale.total)}`,
    '💳 *Pago:* MercadoPago (pagado) ✅',
    c.notes ? `📝 *Nota:* ${c.notes}` : null,
    '', '🧡 ¿Podemos coordinar el envío?',
  ].filter(x => x !== null);
  return lines.join('\n');
}

function renderSummary(sale){
  const wrap = document.getElementById('orderWrap');
  const items = Array.isArray(sale.items) ? sale.items : [];
  const c = sale.customer || {};
  const rows = items.map(i => `
    <div class="sum-row">
      <div><div class="name">${esc(i.name)}</div><div class="qty">${i.qty}× ${fmt(i.price)}</div></div>
      <div class="price">${fmt(i.price * i.qty)}</div>
    </div>`).join('');
  wrap.innerHTML = `
    <div class="order-code">Pedido ${esc(sale.orderCode)}</div>
    <div class="summary">
      <h3>Resumen del pedido</h3>
      ${rows}
      <div class="sum-total"><span>Total</span><span>${fmt(sale.total)}</span></div>
      <div class="sum-meta">
        <div><strong>Cliente:</strong> ${esc((c.name||'') + ' ' + (c.lastname||''))}</div>
        <div><strong>Zona de envío:</strong> ${esc(c.district || '—')} (CP ${esc(c.zip || '—')})</div>
      </div>
    </div>`;
  document.getElementById('btnWa').href = `https://wa.me/${WA_NUM}?text=${encodeURIComponent(buildWaMessage(sale))}`;
}

async function load(){
  const code = getOrderCode();
  const wrap = document.getElementById('orderWrap');
  if(!code){
    wrap.innerHTML = `<p style="color:#4A3040;font-size:14px;line-height:1.6;">Ya recibimos tu pedido y lo estamos preparando con mucho amor.</p>`;
    return;
  }
  try{
    const r = await fetch('/api/sales.php?orderCode=' + encodeURIComponent(code));
    const j = await r.json();
    if(!r.ok || !j.sale) throw new Error(j.error || 'No encontrado');
    renderSummary(j.sale);
  }catch(err){
    wrap.innerHTML = `<div class="error-box">No pudimos cargar el detalle del pedido (${esc(err.message)}). Tu pago fue recibido igual — tocá el botón de WhatsApp y te ayudamos.</div>`;
  }
}

load();
</script>
</body>
</html>
